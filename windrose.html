<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wind Rose</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      background: #ffffff;
      color: #1a1a1a;
      padding: 16px;
    }
    #site-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    #site-name { font-size: 15px; font-weight: 600; }
    #site-coords { font-size: 11px; color: #666; margin-top: 2px; }
    #height-badge {
      font-size: 11px;
      background: #e8f5e9;
      color: #1b5e20;
      border-radius: 4px;
      padding: 3px 8px;
      white-space: nowrap;
    }
    #stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 8px 10px;
    }
    .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }
    .stat-value { font-size: 18px; font-weight: 600; }
    .stat-unit  { font-size: 11px; color: #888; margin-left: 2px; }
    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    #controls label { font-size: 12px; color: #666; }
    #height-select {
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    #chart-wrap {
      position: relative;
      width: 100%;
      height: 340px;
    }
    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #555;
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    #message {
      text-align: center;
      padding: 40px 16px;
      color: #888;
      font-size: 13px;
      line-height: 1.6;
    }
    #message.error { color: #b00020; }
    #attribution {
      margin-top: 14px;
      font-size: 10px;
      color: #aaa;
      line-height: 1.5;
    }
    #attribution a { color: #aaa; }
  </style>
</head>
<body>

<div id="site-header">
  <div>
    <div id="site-name">Wind Rose</div>
    <div id="site-coords">–</div>
  </div>
  <div id="height-badge">100 m</div>
</div>

<div id="stats">
  <div class="stat-card">
    <div class="stat-label">Total power density</div>
    <div class="stat-value" id="stat-total">–<span class="stat-unit">W/m²</span></div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Dominant direction</div>
    <div class="stat-value" id="stat-dir">–</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Peak sector speed</div>
    <div class="stat-value" id="stat-peak">–<span class="stat-unit">m/s</span></div>
  </div>
</div>

<div id="controls">
  <label for="height-select">Hub height:</label>
  <select id="height-select">
    <option value="10">10 m</option>
    <option value="50">50 m</option>
    <option value="100" selected>100 m</option>
    <option value="150">150 m</option>
    <option value="200">200 m</option>
  </select>
</div>

<div id="message">Waiting for a site selection...</div>

<div id="chart-wrap" style="display:none;">
  <canvas id="roseChart"
    role="img"
    aria-label="Polar area wind rose showing wind speed per 30-degree direction sector">
    Wind rose chart: wind speed by direction sector.
  </canvas>
</div>

<div id="legend" style="display:none;"></div>

<div id="attribution">
  Data: Global Wind Atlas 4.0, DTU Wind Energy / World Bank Group (ESMAP).
  <a href="https://globalwindatlas.info" target="_blank" rel="noopener">globalwindatlas.info</a>
</div>

<script>
// ── Configuration ─────────────────────────────────────────────
const PROXY_URL = "https://gwa-waweru.brandonwawire12.workers.dev";

// Green gradient speed bins — light to dark as speed increases
const SPEED_BINS = [
  { max: 2,   label: "< 2 m/s",  color: "#81c784" },
  { max: 4,   label: "2–4 m/s",  color: "#388e3c" },
  { max: 6,   label: "4–6 m/s",  color: "#1b5e20" },
  { max: 8,   label: "6–8 m/s",  color: "#0a3d12" },
  { max: 999, label: "> 8 m/s",  color: "#051a07" },
];

const DIR_LABELS = {
  0:   "N",   30:  "NNE", 60:  "NE",  90:  "ENE",
  120: "E",   150: "ESE", 180: "SE",  210: "SSE",
  240: "S",   270: "SSW", 300: "SW",  330: "WSW"
};

// ── URL params ────────────────────────────────────────────────
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    lat:     parseFloat(p.get("lat")    ?? "NaN"),
    lon:     parseFloat(p.get("lon")    ?? "NaN"),
    height:  parseInt(  p.get("height") ?? "100", 10),
    site_id: p.get("site_id") ?? "Selected site",
  };
}

// ── API call ──────────────────────────────────────────────────
async function fetchWindRose(lat, lon, height) {
  const resp = await fetch(`${PROXY_URL}?lat=${lat}&lon=${lon}&height=${height}`);
  if (!resp.ok) throw new Error(`Proxy returned ${resp.status}`);
  const data = await resp.json();
  if (!data.rose || !Array.isArray(data.rose)) {
    throw new Error("Unexpected response — rose array not found.");
  }
  return data;
}

// ── Colour helper ─────────────────────────────────────────────
function speedColor(value) {
  for (const bin of SPEED_BINS) {
    if (value < bin.max) return bin.color;
  }
  return SPEED_BINS[SPEED_BINS.length - 1].color;
}

// ── Chart ─────────────────────────────────────────────────────
let roseChart = null;

// Custom plugin: draws percentage labels inside each sector petal
// mimicking the GWA style
const petalLabelPlugin = {
  id: "petalLabels",
  afterDatasetDraw(chart) {
    const { ctx, data } = chart;
    const meta = chart.getDatasetMeta(0);
    const total = data.datasets[0].data.reduce((s, v) => s + v, 0);

    meta.data.forEach((arc, i) => {
      const value = data.datasets[0].data[i];
      if (value === 0) return;

      const pct = ((value / total) * 100).toFixed(0) + "%";

      // Place label at 70% of the arc radius so it sits inside the petal
      const midAngle  = arc.startAngle + (arc.endAngle - arc.startAngle) / 2;
      const midRadius = arc.innerRadius + (arc.outerRadius - arc.innerRadius) * 0.68;

      const x = arc.x + Math.cos(midAngle) * midRadius;
      const y = arc.y + Math.sin(midAngle) * midRadius;

      ctx.save();
      ctx.font         = "bold 10px -apple-system, Arial, sans-serif";
      ctx.fillStyle    = "#ffffff";
      ctx.textAlign    = "center";
      ctx.textBaseline = "middle";

      // Only draw if the petal is large enough to fit the label
      const arcLength = (arc.endAngle - arc.startAngle) * midRadius;
      if (arcLength > 18) {
        ctx.fillText(pct, x, y);
      }
      ctx.restore();
    });
  }
};

Chart.register(petalLabelPlugin);

function renderRose(rose) {
  const canvas = document.getElementById("roseChart");
  if (roseChart) { roseChart.destroy(); roseChart = null; }

  const sorted = [...rose].sort((a, b) => a.center_degrees - b.center_degrees);
  const total  = sorted.reduce((s, x) => s + x.value, 0);

  const labels = sorted.map(s => DIR_LABELS[s.center_degrees] ?? `${s.center_degrees}°`);
  const values = sorted.map(s => parseFloat(s.value.toFixed(4)));
  const colors = values.map(speedColor);

  roseChart = new Chart(canvas, {
    type: "polarArea",
    data: {
      labels,
      datasets: [{
        label:           "Wind speed (m/s)",
        data:            values,
        backgroundColor: colors,       // solid fills — bold like GWA
        borderColor:     "#ffffff",    // white dividers between sectors
        borderWidth:     1.5,
      }]
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      animation:           { duration: 600 },
      startAngle:          -Math.PI / 2,  // North at top

      scales: {
        r: {
          beginAtZero: true,
          ticks: {
            font:          { size: 9 },
            color:         "#999",
            backdropColor: "rgba(255,255,255,0.8)",
            // Show percentage on radial rings instead of raw values
            callback: v => {
              if (v === 0) return "";
              const pct = ((v / total) * 100).toFixed(0);
              return pct + "%";
            },
          },
          grid:       { color: "rgba(0,0,0,0.08)" },
          angleLines: { color: "rgba(0,0,0,0.08)" },
          pointLabels: {
            font:  { size: 11, weight: "600" },
            color: "#333",
          },
        }
      },

      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const s   = sorted[ctx.dataIndex];
              const pct = ((s.value / total) * 100).toFixed(1);
              return [
                ` Direction:   ${DIR_LABELS[s.center_degrees]} (${s.center_degrees}°)`,
                ` Wind speed:  ${s.value.toFixed(2)} m/s`,
                ` Share:       ${pct}%`,
              ];
            }
          }
        }
      }
    }
  });
}

// ── UI helpers ────────────────────────────────────────────────
function updateHeader(params) {
  document.getElementById("site-name").textContent   = params.site_id;
  document.getElementById("site-coords").textContent =
    `${params.lat.toFixed(4)}° N,  ${params.lon.toFixed(4)}° E`;
  document.getElementById("height-badge").textContent = `${params.height} m`;
  document.getElementById("height-select").value      = String(params.height);
}

function updateStats(data) {
  const rose     = data.rose;
  const total    = data.total ?? 0;
  const dominant = rose.reduce((b, s) => s.value > b.value ? s : b);

  document.getElementById("stat-total").innerHTML =
    Math.round(total) + '<span class="stat-unit">W/m²</span>';
  document.getElementById("stat-dir").textContent =
    DIR_LABELS[dominant.center_degrees] ?? `${dominant.center_degrees}°`;
  document.getElementById("stat-peak").innerHTML =
    dominant.value.toFixed(2) + '<span class="stat-unit">m/s</span>';
}

function updateLegend() {
  document.getElementById("legend").innerHTML = SPEED_BINS.map(b =>
    `<span class="legend-item">
       <span class="legend-swatch" style="background:${b.color}"></span>
       ${b.label}
     </span>`
  ).join("");
}

function showMessage(text, isError = false) {
  const m = document.getElementById("message");
  m.textContent   = text;
  m.className     = isError ? "error" : "";
  m.style.display = "block";
  document.getElementById("chart-wrap").style.display = "none";
  document.getElementById("legend").style.display     = "none";
}

function showChart() {
  document.getElementById("message").style.display    = "none";
  document.getElementById("chart-wrap").style.display = "block";
  document.getElementById("legend").style.display     = "flex";
}

// ── Main ──────────────────────────────────────────────────────
async function load(params) {
  showMessage("Fetching wind data from Global Wind Atlas…");
  try {
    const data = await fetchWindRose(params.lat, params.lon, params.height);
    updateHeader(params);
    updateStats(data);
    updateLegend();
    renderRose(data.rose);
    showChart();
  } catch (err) {
    console.error("Wind rose error:", err);
    showMessage(`Could not load wind data: ${err.message}`, true);
  }
}

document.getElementById("height-select").addEventListener("change", e => {
  const params  = getParams();
  params.height = parseInt(e.target.value, 10);
  load(params);
});

(function init() {
  const params = getParams();
  if (isNaN(params.lat) || isNaN(params.lon)) {
    showMessage("Select a wind site on the map to load its wind rose.");
    return;
  }
  load(params);
})();
</script>

</body>
</html>
